# Aterra Builders — Netlify configuration
# Static site (repo root) + one serverless function for engagement tracking.

[build]
  publish = "."
  functions = "netlify/functions"

# These keys are PUBLIC by design (client-side Supabase anon key, project URL,
# and the VAPID *public* key) and intentionally live in config.js. Exclude them
# from Netlify secrets scanning so the deploy doesn't fail on them. The truly
# secret values (service_role, Resend, VAPID private) are only in Netlify env
# vars, never committed, so they remain scanned.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,VAPID_PUBLIC_KEY"

[functions]
  node_bundler = "esbuild"

# Pretty URL for the private investor room -> serves the gated function.
# status 200 = rewrite (URL stays /invest); the ?key=... query passes through.
[[redirects]]
  from = "/invest"
  to = "/.netlify/functions/investor-deck"
  status = 200

# Secured machine-to-machine API (shared secret) for minting/managing investor links.
# Action is encoded in BOTH the path segment and the query, so the function can
# resolve it even if Netlify drops the query on the rewrite.
[[redirects]]
  from = "/api/invest-create"
  to = "/.netlify/functions/invest-api/create?action=create"
  status = 200
[[redirects]]
  from = "/api/invest-revoke"
  to = "/.netlify/functions/invest-api/revoke?action=revoke"
  status = 200
[[redirects]]
  from = "/api/invest-list"
  to = "/.netlify/functions/invest-api/list?action=list"
  status = 200

# SPA-friendly: serve the function at /.netlify/functions/track-engagement
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
