<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Set your password — Aterra Builders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
<style>
  body{background:var(--paper);display:flex;align-items:center;justify-content:center;min-height:100svh;padding:2rem}
  .card{width:100%;max-width:26rem;background:var(--paper-2);border:1px solid var(--hair);padding:2.6rem}
  .card h1{font-family:var(--f-display);font-weight:500;font-size:1.7rem;margin-bottom:.4rem}
  .card p.sub{color:var(--muted);font-size:.92rem;margin-bottom:1.8rem}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
  .field input{width:100%;font-family:var(--f-ui);font-size:1rem;color:var(--ink);background:var(--paper-2);
    border:1px solid var(--hair);padding:.95em 1em}
  .field input:focus{outline:none;border-color:var(--ink)}
  button.go{width:100%;justify-content:center;margin-top:.6rem}
</style>
</head>
<body>
  <form id="form" class="card" novalidate>
    <a href="index.html" class="wordmark" style="color:var(--ink);font-size:1.1rem;display:inline-block;margin-bottom:1.6rem">ATERRA<small>BUILDERS</small></a>
    <h1>Set your password</h1>
    <p class="sub" id="sub">Choose a password to finish setting up your admin account.</p>
    <div id="fields">
      <div class="field"><label for="pw">New password</label><input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters"></div>
      <div class="field"><label for="pw2">Confirm password</label><input id="pw2" type="password" autocomplete="new-password"></div>
      <button type="submit" class="ghost solid go">Set password</button>
    </div>
    <p id="note" class="form-note" role="status" aria-live="polite"></p>
  </form>

<script src="config.js"></script>
<script>
(function () {
  var cfg = window.ATERRA_CONFIG || {};
  var SB = cfg.SUPABASE_URL, KEY = cfg.SUPABASE_ANON_KEY;
  var $ = function (s) { return document.querySelector(s); };
  var note = function (m, k) { var el = $('#note'); el.textContent = m; el.className = 'form-note' + (k ? ' ' + k : ''); };

  // Supabase puts the session tokens in the URL hash after an invite/recovery link.
  var hash = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  var access = hash.get('access_token');
  var errDesc = hash.get('error_description');

  if (errDesc) { $('#fields').style.display = 'none'; $('#sub').textContent = 'This link has expired or was already used.'; note('Ask an admin to send you a new invite, or use “Forgot password?” on the sign-in page.', 'err'); return; }
  if (!access) { $('#fields').style.display = 'none'; $('#sub').textContent = 'Open this page from your invite or reset email link.'; note('No valid token found in the link.', 'err'); return; }

  $('#form').addEventListener('submit', function (e) {
    e.preventDefault();
    var pw = $('#pw').value, pw2 = $('#pw2').value;
    if (pw.length < 8) { note('Use at least 8 characters.', 'err'); return; }
    if (pw !== pw2) { note('Passwords don’t match.', 'err'); return; }
    var btn = $('#form').querySelector('button'); btn.disabled = true;
    note('Saving…');
    fetch(SB + '/auth/v1/user', {
      method: 'PUT',
      headers: { apikey: KEY, Authorization: 'Bearer ' + access, 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (res.ok) {
          note('Password set. Taking you to sign in…', 'ok');
          setTimeout(function () { location.href = 'admin.html'; }, 1400);
        } else { note(res.j.msg || res.j.error_description || res.j.error || 'Could not set password.', 'err'); btn.disabled = false; }
      }).catch(function () { note('Network error.', 'err'); btn.disabled = false; });
  });
})();
</script>
</body>
</html>
